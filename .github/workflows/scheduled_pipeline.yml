name: Daily Pipeline Run

on:
  schedule:
    # Runs at 8:00 AM UTC (GMT) every day
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

# Prevent concurrent runs to avoid conflicts
concurrency:
  group: pipeline-run
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Full history for proper git operations

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          # Any subset of these enables an LLM provider. src/llm_client.py tries
          # Cerebras first, then Groq, then OpenRouter as a last-resort failover.
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_PRIMARY_PROVIDER: ${{ vars.LLM_PRIMARY_PROVIDER }}
        run: python run_pipeline.py --no-dashboard --headless

      - name: Stash fresh pipeline outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash our freshly generated files (data + version file)
          cp -r data/ /tmp/fresh_data/
          cp src/_version.py /tmp/fresh_version.py

          # Pull latest from remote (may have code changes we need)
          git fetch origin main

      - name: Verify backup before destructive reset
        run: |
          if [ ! -s /tmp/fresh_data/latest_competitor_news.json ]; then
            echo "::error::Backup missing or empty; aborting before git reset"
            exit 1
          fi
          if [ ! -s /tmp/fresh_version.py ]; then
            echo "::error::Version backup missing or empty; aborting before git reset"
            exit 1
          fi

      - name: Reset to origin/main and restore fresh data
        run: |
          git reset --hard origin/main

          # Restore our fresh data and version file on top
          cp -r /tmp/fresh_data/* data/
          cp /tmp/fresh_version.py src/_version.py

          git add data/
          git add src/_version.py
          # Only commit and push if there are staged changes
          if ! git diff --staged --quiet; then
            git commit -m "Daily pipeline update $(date +'%Y-%m-%d')"
            git push
          else
            echo "No data changes to commit"
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline failed: ${context.runId}`,
              body: `Daily pipeline run ${context.runId} failed.\n\nLog: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
              labels: ['pipeline-failure']
            });
